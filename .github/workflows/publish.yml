name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@moraya'
          # Writes the token into ~/.npmrc so `pnpm publish` picks it up.
          # Without this, `always-auth` defaults to false and pnpm falls
          # through to anonymous auth — npm then returns
          # "404 Not Found - @moraya/core@X.Y.Z is not in this registry",
          # which is npm's confusing way of saying the (empty) caller
          # lacks publish access to the @moraya scope.
          always-auth: true

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npmjs.com
        # `--access public` is required for the FIRST publish of a scoped
        # package under a new tag/version. `publishConfig.access=public`
        # in package.json SHOULD cover this, but pnpm 10 has a known
        # regression where the CLI flag wins over publishConfig — passing
        # it explicitly here is belt-and-braces.
        # `NPM_CONFIG_TOKEN` is the env var pnpm honors in addition to
        # `NODE_AUTH_TOKEN`; setting both covers pnpm ≥8 and older.
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
