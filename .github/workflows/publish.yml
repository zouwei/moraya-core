name: Publish

on:
  push:
    tags:
      - 'v*'
  # Allow a manual run to exercise the pipeline without cutting a new tag.
  # (Publish is skipped if the version already exists — see the guard below.)
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Required for npm Trusted Publishing (OIDC). GitHub mints a short-lived
      # signed identity token that npm verifies against the trusted publisher
      # configured on the package — no NPM_TOKEN secret, and 2FA-IMMUNE
      # (the account's "require OTP on publish" enforcement does not apply to
      # OIDC publishes). This replaces the token-based flow that kept failing
      # with `EOTP: This operation requires a one-time password`.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing + automatic provenance require npm >= 11.5.1.
      # setup-node ships npm 10.x with Node 22, so upgrade the global npm.
      #
      # Pinned to a specific 11.x release, NOT `npm@latest`: the v0.7.4
      # publish run (2026-07-09) picked up npm 12.0.0 — a brand-new major
      # version published just before this ran — and its `--provenance` flow
      # was broken (`MODULE_NOT_FOUND: Cannot find module 'sigstore'` inside
      # npm's own libnpmpublish, i.e. an npm packaging bug, not anything in
      # this repo). 11.18.0 is the last stable 11.x release before 12.0.0.
      # Bump deliberately when ready to adopt a newer npm, not automatically.
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@11.18.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Idempotency: a re-run on an existing tag (or a manual dispatch after a
      # local `pnpm release` already published) must not hard-fail with
      # EPUBLISHCONFLICT. Skip the publish step when the version is already live.
      - name: Check if version is already published
        id: pub
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          if npm view "@moraya/core@$VER" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@moraya/core@$VER already on npm — skipping publish."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      # Publish via OIDC — no NODE_AUTH_TOKEN. `npm publish` (NOT `pnpm publish`,
      # which does not yet support trusted publishing) performs the OIDC token
      # exchange automatically because `id-token: write` is granted above and
      # the package is configured with a matching trusted publisher on npmjs.com.
      # `--provenance` attaches a signed build-provenance attestation (npm shows
      # a "Published via GitHub Actions" badge).
      - name: Publish to npm (Trusted Publishing / OIDC)
        if: steps.pub.outputs.already == 'false'
        run: npm publish --access public --provenance

  # Create a GitHub Release for the tag once npm publish succeeds, so the repo's
  # Releases page mirrors the npm version history (previously we only pushed
  # tags — 0 Releases). Notes are auto-generated from the commits since the
  # previous tag (CHANGELOG.md is not maintained per-version). Only runs on a
  # real tag push, never on workflow_dispatch (where ref_name would be a branch).
  github-release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: v
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: '@moraya/core ${{ github.ref_name }}'
          generate_release_notes: true
          body: |
            📦 **npm**: https://www.npmjs.com/package/@moraya/core/v/${{ steps.v.outputs.version }}

            ```bash
            pnpm add @moraya/core@^${{ steps.v.outputs.version }}
            ```

            Published via GitHub Actions with a signed SLSA provenance attestation.

            ---
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
